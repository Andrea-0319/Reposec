<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Review Dashboard</title>
    <meta name="description" content="Interactive dashboard for security scan reports — visualize, navigate, and compare findings.">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Chart.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1>
                    <span class="brand-icon">🛡️</span>
                    Security Review
                </h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="active" id="nav-home">
                    <span class="nav-icon">📊</span> Projects
                </a>
                <a href="/launch" id="nav-launch">
                    <span class="nav-icon">🚀</span> New Scan
                </a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <header class="page-header">
                <h2>Projects</h2>
            </header>
            <section class="page-body" id="app-root">
                <!-- Content rendered by JS -->
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // Render projects grid on page load
        document.addEventListener('DOMContentLoaded', () => {
            renderProjects(document.getElementById('app-root'));
        });
    </script>
</body>
</html>
