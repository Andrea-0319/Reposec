<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Report — Security Review Dashboard</title>
    <meta name="description"
        content="Detailed security scan report with findings, severity chart, and remediation guidance.">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1><span class="brand-icon">🛡️</span> Security Review</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" id="nav-home"><span class="nav-icon">📊</span> Projects</a>
                <a href="/launch" id="nav-launch"><span class="nav-icon">🚀</span> New Scan</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <div class="breadcrumb"><a href="/">Projects</a> / Scan Report</div>
                    <h2>Scan Report</h2>
                </div>
            </header>
            <section class="page-body" id="app-root"></section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Extract scan ID from URL: /scan/{id}
            const parts = window.location.pathname.split('/');
            const scanId = parseInt(parts[parts.length - 1]);
            if (scanId) {
                renderScanReport(document.getElementById('app-root'), scanId);
            }
        });
    </script>
</body>

</html>
