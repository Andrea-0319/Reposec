<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch Scan — Security Review Dashboard</title>
    <meta name="description" content="Launch a new security scan from the dashboard.">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1><span class="brand-icon">🛡️</span> Security Review</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" id="nav-home"><span class="nav-icon">📊</span> Projects</a>
                <a href="/launch" class="active" id="nav-launch"><span class="nav-icon">🚀</span> New Scan</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h2>Launch New Scan</h2>
            </header>
            <section class="page-body">
                <div class="card" style="max-width: 640px;">
                    <form id="launch-form">
                        <div class="form-group">
                            <label for="repo_path">Repository Path</label>
                            <input type="text" class="form-input" id="repo_path" name="repo_path"
                                placeholder="C:\path\to\your\project" required>
                        </div>

                        <div class="form-group">
                            <label for="model">Model (optional)</label>
                            <input type="text" class="form-input" id="model" name="model"
                                placeholder="opencode/minimax-m2.5-free">
                        </div>

                        <div class="form-group">
                            <label for="backend">Backend</label>
                            <select class="form-select" id="backend" name="backend">
                                <option value="">Default (cli)</option>
                                <option value="cli">CLI</option>
                                <option value="sdk">SDK</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="parallel">Parallel Agents</label>
                            <select class="form-select" id="parallel" name="parallel">
                                <option value="1" selected>1 (sequential)</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary" id="launch-btn">
                            🚀 Launch Scan
                        </button>
                    </form>
                </div>

                <!-- Scan status updates appear here -->
                <div id="scan-status" class="mt-3"></div>
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setupLaunchForm(
                document.getElementById('launch-form'),
                document.getElementById('scan-status'),
            );
        });
    </script>
</body>

</html>
