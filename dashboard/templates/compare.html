<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Scans — Security Review Dashboard</title>
    <meta name="description"
        content="Compare two security scans side by side — see new, resolved, and unchanged findings.">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1><span class="brand-icon">🛡️</span> Security Review</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" id="nav-home"><span class="nav-icon">📊</span> Projects</a>
                <a href="/launch" id="nav-launch"><span class="nav-icon">🚀</span> New Scan</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <div class="breadcrumb"><a href="/">Projects</a> / Compare Scans</div>
                    <h2>Scan Comparison</h2>
                </div>
            </header>
            <section class="page-body" id="app-root"></section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Extract scan IDs from query params: /compare?a={id}&b={id}
            const params = new URLSearchParams(window.location.search);
            const idA = parseInt(params.get('a'));
            const idB = parseInt(params.get('b'));
            const root = document.getElementById('app-root');

            if (idA && idB) {
                renderComparison(root, idA, idB);
            } else {
                root.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">↔</div>
                        <p>Select two scans to compare from a project page.</p>
                    </div>`;
            }
        });
    </script>
</body>

</html>
